name: gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # .gitleaks.toml in repo root allowlists the planted demo fixtures
          # under examples/**/.env.example (NOT real credentials — they're
          # the public gitleaks test fixtures). The action picks up the
          # config automatically when GITLEAKS_CONFIG is set or the file is
          # at the default location.
          GITLEAKS_CONFIG: .gitleaks.toml

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
        with:
          scan-args: |
            --recursive
            ./

  sast:
    # Run the local gate orchestrator so CI and `scripts/gates.sh sast`
    # invoke semgrep byte-for-byte identically. Without this, CI can pass
    # while local fails (or vice versa) on the same diff.
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: install sqlite3 (for gate audit log)
        # The semgrep image historically shipped as Alpine; newer tags are
        # Debian-based. Detect explicitly rather than rely on `||` shell
        # precedence (which would run apt-get even on a successful apk).
        run: |
          set -e
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache sqlite git
          else
            apt-get update && apt-get install -y sqlite3 git
          fi
      - name: prep .env (defaults)
        run: cp .env.example .env
      - name: gates.sh sast
        env:
          CLAGENTIC_NO_PROMPT: "1"
        run: |
          chmod +x scripts/*.sh
          scripts/gates.sh init
          scripts/gates.sh sast

  smoke:
    # End-to-end smoke + local orchestrator gates. Runs on BOTH ubuntu and
    # macOS so the cross-platform claim in docs/GATES.md is real, not just
    # smoke. Each step calls scripts/gates.sh — the same surface a user
    # invokes locally via `/ship` — not a different action.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install sqlite3 + jq + coreutils (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3 jq coreutils
      - name: install sqlite + jq + coreutils (macos)
        if: runner.os == 'macOS'
        # coreutils provides gtimeout, which $DS_TIMEOUT_CMD detects.
        run: brew install sqlite jq coreutils
      - name: install gitleaks
        # Tarball names: gitleaks_<ver>_<os>_x64.tar.gz where os = linux|darwin.
        # We use brew on macOS to avoid having to branch on arm64/x64 there.
        run: |
          set -e
          # gitleaks 8.25+ required: .gitleaks.toml uses the [[allowlists]]
          # array-of-tables syntax and the `condition = "AND"` directive, both
          # introduced in 8.25. Older versions silently misread the allowlist.
          if [ "${{ runner.os }}" = "Linux" ]; then
            GLVER=8.25.1
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GLVER}/gitleaks_${GLVER}_linux_x64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin gitleaks
            gitleaks version
          else
            brew install gitleaks
            gitleaks version
          fi
      - name: prep .env (defaults)
        run: cp .env.example .env
      - name: smoke
        env:
          CLAGENTIC_NO_PROMPT: "1"
        run: |
          chmod +x scripts/*.sh .claude/hooks/*.sh install.sh
          ./install.sh --no-prompt
          scripts/smoke.sh --quick
      - name: gates.sh secrets (local orchestrator, cross-OS)
        run: scripts/gates.sh secrets || true   # informational on a clean tree
      - name: gates.sh digest
        run: scripts/gates.sh digest
